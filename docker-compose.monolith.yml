services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erpdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata_monolith:/var/lib/postgresql/data

  monolith:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://erp:erp@127.0.0.1:5433/erpdb
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata_monolith: